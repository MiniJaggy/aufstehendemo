<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Freigaben</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
body { font-family: 'Inter', system-ui, sans-serif; background:#0f0f1a; color:white; padding:40px; }
img { width:150px; border-radius:12px; object-fit:cover; }
.card { background:#1a1a2e; padding:20px; border-radius:16px; margin-bottom:20px; display:flex; align-items:center; gap:20px; transition: transform 0.2s, box-shadow 0.2s; }
.card:hover { transform: translateY(-3px); box-shadow:0 10px 25px rgba(0,0,0,0.3); }
button { margin-right:10px; padding:8px 12px; border:none; border-radius:8px; cursor:pointer; }
button:disabled { opacity:0.6; cursor:not-allowed; }
button.approve { background:#10b981; }
button.approve:hover { background:#059669; }
button.delete { background:#ef4444; }
button.delete:hover { background:#b91c1c; }
#loginBox { max-width:300px; margin-bottom:40px; }
input { width:100%; padding:8px; margin-bottom:10px; border-radius:6px; border:none; }
</style>
</head>
<body>
<h1>Admin – Freigaben</h1>

<div id="loginBox">
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Passwort"><br>
  <button onclick="login()">Login</button>
</div>

<div id="adminArea" style="display:none;">
  <h2>Pending Bilder</h2>
  <div id="pending"></div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://djwqafwatsdmtdxddsbw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqd3FhZndhdHNkbXRkeGRkc2J3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTEyNTIsImV4cCI6MjA4Nzk2NzI1Mn0.TIBteS5tozkfHnfgjdEvjjD7QJB029F9Rlv0FfFmEGU"
);

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if(error){ alert("Login fehlgeschlagen: "+error.message); return; }
  alert("Login erfolgreich!");
  document.getElementById("loginBox").style.display="none";
  document.getElementById("adminArea").style.display="block";
  loadPending();
}

async function loadPending(){
  const container = document.getElementById("pending");
  container.innerHTML="";
  const { data, error } = await supabaseClient.storage.from("bilder").list("pending");
  if(error){ console.log(error); return; }
  if(!data || data.length===0) return;

  for(const file of data){
    const card = document.createElement("div"); card.className="card";

    const img = document.createElement("img");
    const { data: urlData } = await supabaseClient.storage.from("bilder").createSignedUrl("pending/"+file.name,60);
    img.src = urlData.signedUrl;

    const approve = document.createElement("button"); approve.innerText="Freigeben"; approve.className="approve";
    approve.onclick = async ()=>{
      approve.innerText="Freigabe läuft..."; approve.disabled=true;
      const { error: copyError } = await supabaseClient.storage.from("bilder").copy("pending/"+file.name,"public/"+file.name);
      if(copyError){ alert(copyError.message); approve.innerText="Freigeben"; approve.disabled=false; return; }
      const { error: delError } = await supabaseClient.storage.from("bilder").remove(["pending/"+file.name]);
      if(delError){ alert(delError.message); approve.innerText="Freigeben"; approve.disabled=false; return; }
      await loadPending();
    };

    const del = document.createElement("button"); del.innerText="Ablehnen"; del.className="delete";
    del.onclick = async ()=>{
      del.innerText="Löschen..."; del.disabled=true;
      const { error: delError } = await supabaseClient.storage.from("bilder").remove(["pending/"+file.name]);
      if(delError){ alert(delError.message); del.innerText="Ablehnen"; del.disabled=false; return; }
      await loadPending();
    };

    card.appendChild(img); card.appendChild(approve); card.appendChild(del);
    container.appendChild(card);
  }
}
</script>
</body>
</html>
