<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Bereich</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #111;
  color: white;
  padding: 40px;
}
h1 { text-align:center; margin-bottom:30px; }
#loginBox input {
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
  width: 250px;
}
#loginBox button {
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background: #4f46e5;
  color:white;
  cursor:pointer;
}
.adminSection { display:none; }
.gallery {
  display:flex;
  flex-direction:column;
  gap:20px;
  margin-top:20px;
}
.card {
  background: #1e1e2f;
  padding:15px;
  border-radius:16px;
  display:flex;
  align-items:center;
  gap:15px;
}
.card img {
  max-height:150px;
  width:auto;
  border-radius:12px;
  transition: transform 0.3s;
}
.card button {
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}
.approve { background:green; color:white; }
.delete { background:red; color:white; }
.rotate { background:#f59e0b; color:white; }
</style>
</head>
<body>

<h1>Admin – Freigaben</h1>

<div id="loginBox">
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Passwort"><br>
  <button onclick="login()">Login</button>
</div>

<div class="adminSection" id="adminArea">
  <h2>Pending Bilder</h2>
  <div class="gallery" id="pending"></div>

  <h2>Freigegebene Bilder</h2>
  <div class="gallery" id="public"></div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://djwqafwatsdmtdxddsbw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqd3FhZndhdHNkbXRkeGRkc2J3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTEyNTIsImV4cCI6MjA4Nzk2NzI1Mn0.TIBteS5tozkfHnfgjdEvjjD7QJB029F9Rlv0FfFmEGU"
);

// --- Login ---
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if(error){ alert("Login fehlgeschlagen: "+error.message); return; }

  document.getElementById("loginBox").style.display="none";
  document.getElementById("adminArea").style.display="block";
  loadGalleries();
}

// --- Galleries laden ---
async function loadGalleries(){
  const pendingDiv = document.getElementById("pending");
  const publicDiv = document.getElementById("public");

  const { data: pendingData } = await supabaseClient.storage.from("bilder").list("pending");
  pendingDiv.innerHTML="";
  for(const file of pendingData || []){
    const { data: urlData } = await supabaseClient.storage.from("bilder").createSignedUrl("pending/" + file.name, 60);
    const card = createCard(urlData.signedUrl, file.name, true);
    pendingDiv.appendChild(card);
  }

  const { data: publicData } = await supabaseClient.storage.from("bilder").list("public");
  publicDiv.innerHTML="";
  for(const file of publicData || []){
    const { data: urlData } = await supabaseClient.storage.from("bilder").createSignedUrl("public/" + file.name, 60);
    const card = createCard(urlData.signedUrl, file.name, false);
    publicDiv.appendChild(card);
  }
}

// --- Card erstellen ---
function createCard(url, fileName, isPending){

  const card = document.createElement("div");
  card.className="card";

  const img = document.createElement("img");
  img.src = url;

  let rotation = 0;

  const rotateLeft = document.createElement("button");
  rotateLeft.innerText="⟲";
  rotateLeft.className="rotate";
  rotateLeft.onclick = ()=>{
    rotation -= 90;
    img.style.transform = `rotate(${rotation}deg)`;
  };

  const rotateRight = document.createElement("button");
  rotateRight.innerText="⟳";
  rotateRight.className="rotate";
  rotateRight.onclick = ()=>{
    rotation += 90;
    img.style.transform = `rotate(${rotation}deg)`;
  };

  const approveBtn = document.createElement("button");
  approveBtn.innerText="Freigeben";
  approveBtn.className="approve";

  approveBtn.onclick = async ()=>{

    const response = await fetch(url);
    const blob = await response.blob();

    const imageBitmap = await createImageBitmap(blob);

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const angle = rotation % 360;

    if(angle === 90 || angle === -270 || angle === -90 || angle === 270){
      canvas.width = imageBitmap.height;
      canvas.height = imageBitmap.width;
    } else {
      canvas.width = imageBitmap.width;
      canvas.height = imageBitmap.height;
    }

    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(angle * Math.PI / 180);
    ctx.drawImage(imageBitmap, -imageBitmap.width/2, -imageBitmap.height/2);

    const rotatedBlob = await new Promise(resolve =>
      canvas.toBlob(resolve, "image/jpeg", 0.9)
    );

    // hochladen
    await supabaseClient.storage
      .from("bilder")
      .upload("public/" + fileName, rotatedBlob, {
        contentType: "image/jpeg"
      });

    // original löschen
    await supabaseClient.storage
      .from("bilder")
      .remove(["pending/" + fileName]);

    loadGalleries();
  };

  const deleteBtn = document.createElement("button");
  deleteBtn.innerText="Löschen";
  deleteBtn.className="delete";

  deleteBtn.onclick = async ()=>{
    const path = isPending ? "pending/" + fileName : "public/" + fileName;

    await supabaseClient.storage
      .from("bilder")
      .remove([path]);

    loadGalleries();
  };

  card.appendChild(img);

  if(isPending){
    card.appendChild(rotateLeft);
    card.appendChild(rotateRight);
    card.appendChild(approveBtn);
  }

  card.appendChild(deleteBtn);

  return card;
}

</script>
</body>
</html>
